<div class="dashboard-container">
  <div class="stats-grid">
    <!-- Total Users Card -->
    <mat-card class="stat-card">
      <div class="stat-header">
        <div class="stat-icon-container"><mat-icon class="stat-icon">group</mat-icon></div>
        <div class="stat-info">
          <span class="stat-label">Total Users</span>
          <h2 class="stat-value">12,543</h2>
        </div>
      </div>
      <div class="stat-footer">
        <mat-icon class="trend-up">trending_up</mat-icon>
        <span class="trend-text">+12.5%</span>
      </div>
    </mat-card>

    <!-- Total Orders Card -->
    <mat-card class="stat-card">
      <div class="stat-header">
        <div class="stat-icon-container"><mat-icon class="stat-icon">shopping_cart</mat-icon></div>
        <div class="stat-info">
          <span class="stat-label">Total Orders</span>
          <h2 class="stat-value">1,284</h2>
        </div>
      </div>
      <div class="stat-footer">
        <mat-icon class="trend-up">trending_up</mat-icon>
        <span class="trend-text">+5.2%</span>
      </div>
    </mat-card>

    <!-- Total Revenue Card -->
    <mat-card class="stat-card">
      <div class="stat-header">
        <div class="stat-icon-container"><mat-icon class="stat-icon">payments</mat-icon></div>
        <div class="stat-info">
          <span class="stat-label">Total Revenue</span>
          <h2 class="stat-value">$45,678</h2>
        </div>
      </div>
      <div class="stat-footer">
        <mat-icon class="trend-down">trending_down</mat-icon>
        <span class="trend-text">-2.4%</span>
      </div>
    </mat-card>

    <!-- Active Sessions Card -->
    <mat-card class="stat-card">
      <div class="stat-header">
        <div class="stat-icon-container"><mat-icon class="stat-icon">sensors</mat-icon></div>
        <div class="stat-info">
          <span class="stat-label">Active Sessions</span>
          <h2 class="stat-value">432</h2>
        </div>
      </div>
      <div class="stat-footer">
        <mat-icon class="trend-up">trending_up</mat-icon>
        <span class="trend-text">Live Now</span>
      </div>
    </mat-card>
  </div>
</div>
